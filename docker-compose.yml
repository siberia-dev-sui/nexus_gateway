services:
  postgres:
    image: postgres:16-alpine
    container_name: nexus_postgres
    restart: always
    environment:
      POSTGRES_DB: nexus
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"

  redis:
    image: redis:7-alpine
    container_name: nexus_redis
    restart: always
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy noeviction
      --save 60 1
    volumes:
      - redis_data:/data
    expose:
      - "6379"

  gateway:
    build: .
    container_name: nexus_gateway
    restart: always
    env_file:
      - .env
    expose:
      - "3000"
    depends_on:
      - postgres
      - redis

  nginx:
    image: nginx:alpine
    container_name: nexus_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - gateway

volumes:
  postgres_data:
  redis_data:
